<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Data Alumni</title>


<style>

*{
box-sizing:border-box;
font-family:'Segoe UI',Arial,sans-serif;
}


body{

margin:0;
min-height:100vh;

background:
linear-gradient(135deg,#667eea,#764ba2);

display:flex;
justify-content:center;
align-items:center;

padding:20px;

}



.card{

width:100%;
max-width:450px;

background:white;

padding:25px;

border-radius:25px;

box-shadow:
0 20px 50px #0005;

animation: masuk .5s;

}


@keyframes masuk{

from{
opacity:0;
transform:translateY(30px);
}

to{
opacity:1;
transform:translateY(0);
}

}



h1{

text-align:center;
color:#764ba2;

}


.icon{

text-align:center;
font-size:45px;

}



input,textarea{

width:100%;

padding:14px;

margin-top:12px;

border-radius:15px;

border:1px solid #ddd;

outline:none;

font-size:15px;

}



textarea{

height:100px;
resize:none;

}



button{

width:100%;

margin-top:18px;

padding:15px;

border:0;

border-radius:15px;

background:#764ba2;

color:white;

font-size:17px;

cursor:pointer;

transition:.3s;

}



button:hover{

background:#5a3780;

}



#status{

text-align:center;

margin-top:15px;

font-weight:bold;

}



.footer{

text-align:center;

margin-top:15px;

font-size:12px;

color:#777;

}



</style>


</head>


<body>



<div class="card">


<div class="icon">🎓</div>


<h1>Data Alumni</h1>



<input 
id="nama"
placeholder="Nama Alumni">



<textarea
id="alamat"
placeholder="Alamat Lengkap">
</textarea>



<input
id="hp"
placeholder="No HP">



<input
id="tahun"
type="number"
placeholder="Tahun Alumni">



<button onclick="simpan()">

Simpan Data

</button>



<div id="status"></div>


<div class="footer">
Data Alumni Digital
</div>


</div>





<script>


const URL_GOOGLE_SCRIPT = 
"https://script.google.com/macros/s/AKfycbxW52rCPLVpMlvjfSMPheM2GdCa1O5YV-sYXR0KWLwJoHvQWfuYOtIjJMrrmiqH_MI/exec";





function simpan(){


let nama =
document.getElementById("nama").value;


let alamat =
document.getElementById("alamat").value;


let hp =
document.getElementById("hp").value;


let tahun =
document.getElementById("tahun").value;



if(!nama || !alamat || !hp || !tahun){

alert("Semua data wajib diisi");

return;

}



document.getElementById("status")
.innerHTML="⏳ Menyimpan...";





fetch(URL_GOOGLE_SCRIPT,{

method:"POST",

body:JSON.stringify({

nama:nama,

alamat:alamat,

hp:hp,

tahun:tahun

})

})


.then(()=>{


document.getElementById("status")
.innerHTML="✅ Data berhasil disimpan";


document
.querySelectorAll("input,textarea")
.forEach(x=>x.value="");


})


.catch(()=>{


document.getElementById("status")
.innerHTML="❌ Gagal menyimpan";


});



}



</script>



</body>
</html>
